# Run with `dart run ffigen --config ffigen.yaml`.
name: FlutterXattrBindings
description: |
  Bindings for `src/flutter_xattr.h`.

  Regenerate bindings with `dart run ffigen --config ffigen.yaml`.
output: 'lib/flutter_xattr_bindings_generated.dart'
headers:
  entry-points:
    - 'src/flutter_xattr.h'
  include-directives:
    - 'src/flutter_xattr.h'
ffi-native:
comments:
  style: any
  length: full
compiler-opts:
  - "-I/usr/lib/clang/21/include"
